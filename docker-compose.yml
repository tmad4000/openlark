services:
  postgres:
    image: postgres:16
    container_name: openlark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openlark
      POSTGRES_PASSWORD: openlark
      POSTGRES_DB: openlark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openlark"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: openlark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  collab:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    container_name: openlark-collab
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      DATABASE_URL: postgresql://openlark:openlark@postgres:5432/openlark
      COLLAB_PORT: 1234
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
