services:
  postgres:
    image: postgres:16
    container_name: openlark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openlark
      POSTGRES_PASSWORD: openlark
      POSTGRES_DB: openlark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openlark"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: openlark-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: openlark-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    command: --dev --bind 0.0.0.0

  minio:
    image: minio/minio:latest
    container_name: openlark-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: openlark-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/openlark-uploads;
      exit 0;
      "

  collab:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    container_name: openlark-collab
    restart: unless-stopped
    ports:
      - "1234:1234"
    environment:
      DATABASE_URL: postgresql://openlark:openlark@postgres:5432/openlark
      COLLAB_PORT: 1234
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
